# Conventional commits (feat/fix/chore/…) on main open a Release PR that bumps
# .release-please-manifest.json + CHANGELOG.md. Merging it creates the tag and
# GitHub Release automatically. Docs site mirrors CHANGELOG on the next docs build.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release-please
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
