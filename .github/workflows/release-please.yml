# Conventional commits (feat/fix/chore/…) on main are rolled into a Release PR
# that bumps .release-please-manifest.json + CHANGELOG.md. This workflow does
# NOT tag or publish a release — it only opens/updates that PR. The actual
# release happens when you merge the Release PR (tag + GitHub Release).
#
# Trigger is manual so merges to main do not run Release Please every time.
# Actions → Release Please → Run workflow (choose branch main) when you want
# the Release PR refreshed from the current main history.

name: Release Please

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          # Default $GITHUB_TOKEN needs repo Setting: Actions → General → Workflow permissions →
          # "Allow GitHub Actions to create and approve pull requests". If that stays off org-wide,
          # add a PAT with repo + pull-requests scopes as repo secret RELEASE_PLEASE_TOKEN.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
