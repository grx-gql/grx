# Automatic versioning + changelog: push to main (or manual workflow_dispatch on main)
# runs release-please (opens / updates Release PR). Merge that PR → tag + GitHub Release
# → tag push runs pkg.go.dev warmup below.
#
# release-please opens a PR → needs pull-requests (+ usually issues) scopes.
# If you see «not permitted to create or approve pull requests», fix repo/org
# Settings (see RELEASING.md § Permissions) or set RELEASE_PLEASE_TOKEN PAT.
name: Release

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
      - "redis-pubsub/v[0-9]+.[0-9]+.[0-9]+"
      - "redis-pubsub/v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    name: Open / update Release PR
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  proxy-warm:
    name: Warm pkg.go.dev
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Request module from proxy.golang.org
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"

          if [[ "${TAG}" == redis-pubsub/* ]]; then
            MODULE="github.com/grx-gql/grx/redis-pubsub"
            VERSION="${TAG#redis-pubsub/}"
          else
            MODULE="github.com/grx-gql/grx"
            VERSION="${TAG}"
          fi

          echo "Warming proxy for ${MODULE}@${VERSION}"
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || \
            echo "::warning::proxy.golang.org did not return ${MODULE}@${VERSION} yet (it may take a few minutes)"
