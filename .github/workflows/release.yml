# Root module automated releases run via release-please (conventional commits). This workflow:
# • On workflow_dispatch — manual tag create + GitHub Release (e.g. nested redis-pubsub).
# • On tag push — verify + proxy warm (covers tags created by Release Please merges).
#
# Nested redis module is not wired into release-please yet; publish it manually here.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
      - "redis-pubsub/v[0-9]+.[0-9]+.[0-9]+"
      - "redis-pubsub/v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v0.1.0)."
        required: true
        type: string
      target_ref:
        description: "Branch, tag, or SHA to release from."
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify build & tests
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Validate manual tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.+-]+)?$ ]]; then exit 0; fi
          if [[ "${TAG}" =~ ^redis-pubsub/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.+-]+)?$ ]]; then exit 0; fi
          echo "::error::Tag must be vX.Y.Z or redis-pubsub/vX.Y.Z (optional SemVer prerelease suffix)"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
          fetch-depth: 0

      - name: Resolve checked out SHA
        id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod verify (all shipped modules)
        run: |
          set -euo pipefail
          go mod verify
          (cd benchmark && go mod verify)
          (cd redis-pubsub && go mod verify)

      - name: go vet
        run: make vet

      - name: go build
        run: make build

      - name: go test (root + submodules)
        run: make test

      - name: go test -race
        run: make test-race

  manual-github-release:
    name: Manual tag + GitHub Release
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.target_sha }}
          fetch-depth: 0

      - name: Resolve tag metadata
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [[ "${TAG}" == redis-pubsub/* ]]; then
            VERSION="${TAG#redis-pubsub/}"
            echo "module=redis-pubsub" >> "$GITHUB_OUTPUT"
          else
            VERSION="${TAG}"
            echo "module=root" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag for manual release
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          TARGET_SHA="${{ needs.verify.outputs.target_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            EXISTING_SHA="$(git rev-list -n 1 "${TAG}")"
            if [[ "${EXISTING_SHA}" != "${TARGET_SHA}" ]]; then
              echo "::error::tag ${TAG} already exists at ${EXISTING_SHA}, expected ${TARGET_SHA}"
              exit 1
            fi
            echo "Tag ${TAG} already exists at ${TARGET_SHA}"
            exit 0
          fi

          git tag "${TAG}" "${TARGET_SHA}"
          git push origin "refs/tags/${TAG}"

      - name: Extract changelog section
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          STRIPPED="${VERSION#v}"

          NOTES_FILE="$(mktemp)"
          awk -v v="${STRIPPED}" '
            BEGIN { found=0 }
            /^## / {
              if (found) exit
              if ($0 ~ "(\\[" v "\\]|[ \\[]v?" v "([ \\]]|$))") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > "${NOTES_FILE}" || true

          if [[ -s "${NOTES_FILE}" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.module == 'root' && steps.meta.outputs.version || format('redis-pubsub {0}', steps.meta.outputs.version) }}
          body_path: ${{ steps.changelog.outputs.found == 'true' && steps.changelog.outputs.path || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: false

  proxy-warm:
    name: Warm pkg.go.dev
    needs:
      - verify
      - manual-github-release
    # Tag pushes skip manual-github-release; dispatch runs both. Waiting on the skipped job is OK.
    if: always() && needs.verify.result == 'success' && (needs.manual-github-release.result == 'success' || needs.manual-github-release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Request module from proxy.golang.org
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ "${TAG}" == redis-pubsub/* ]]; then
            MODULE="github.com/grx-gql/grx/redis-pubsub"
            VERSION="${TAG#redis-pubsub/}"
          else
            MODULE="github.com/grx-gql/grx"
            VERSION="${TAG}"
          fi

          echo "Warming proxy for ${MODULE}@${VERSION}"
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || \
            echo "::warning::proxy.golang.org did not return ${MODULE}@${VERSION} yet (it may take a few minutes)"
