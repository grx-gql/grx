# Automatic versioning + changelog: push to main (or manual workflow_dispatch on main)
# runs release-please (opens / updates Release PR). Merge that PR → tag + GitHub Release
# → tag push runs pkg.go.dev warmup below.
#
# release-please opens a PR → needs pull-requests (+ usually issues) scopes.
# If you see «not permitted to create or approve pull requests», set the repo to
# Settings → Actions → General → Workflow permissions: Read and write, and
# allow Actions to create pull requests — or set RELEASE_PLEASE_TOKEN PAT.
name: Release

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
      - "redis-pubsub/v[0-9]+.[0-9]+.[0-9]+"
      - "redis-pubsub/v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    name: Open / update Release PR
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  proxy-warm:
    name: Warm pkg.go.dev
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Request module from proxy.golang.org
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"

          if [[ "${TAG}" == redis-pubsub/* ]]; then
            MODULE="github.com/grx-gql/grx/redis-pubsub"
            VERSION="${TAG#redis-pubsub/}"
          else
            MODULE="github.com/grx-gql/grx"
            VERSION="${TAG}"
          fi

          echo "Warming proxy for ${MODULE}@${VERSION}"
          URL="https://proxy.golang.org/${MODULE}/@v/${VERSION}.info"
          MAX=10
          INTERVAL=30
          for i in $(seq 1 "${MAX}"); do
            if curl -fsSL "$URL" -o /dev/null; then
              echo "✓ Proxy warmed (${MODULE}@${VERSION}) after ${i} attempt(s)"
              exit 0
            fi
            echo "Attempt ${i}/${MAX}: indexer not ready; sleeping ${INTERVAL}s…"
            if [[ "${i}" -lt "${MAX}" ]]; then sleep "${INTERVAL}"; fi
          done
          echo "::warning::proxy.golang.org still had no .info for ${MODULE}@${VERSION} after retries — the Go proxy can lag newly pushed tags by several minutes; try: go get ${MODULE}@${VERSION}"
