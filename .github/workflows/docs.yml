name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/sync-changelog.sh"
      - "scripts/check-docs-changelog.sh"
      - "scripts/sync-roadmap.sh"
      - "CHANGELOG.md"
      - "README.md"
      - "ROADMAP.md"
      - "Makefile"
      - ".github/workflows/docs.yml"
      - "**/*.go"
  pull_request:
    paths:
      - "docs/**"
      - "scripts/sync-changelog.sh"
      - "scripts/check-docs-changelog.sh"
      - "scripts/sync-roadmap.sh"
      - "CHANGELOG.md"
      - "README.md"
      - "ROADMAP.md"
      - "Makefile"
      - ".github/workflows/docs.yml"
      - "**/*.go"
  workflow_dispatch:

# Pause automatic GitHub Pages deploys. Set to 'false' or remove to resume.
env:
  PAUSE_DOCS_DEPLOY: "true"

# Required by actions/deploy-pages. `contents: read` is enough for the
# checkout, `pages: write` and `id-token: write` are what the official
# Pages deploy action expects.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment per ref. Don't cancel in-progress
# deploys on `main` so a queued release isn't lost; PR builds key on the
# PR ref so they can run in parallel with main.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    outputs:
      pause_deploy: ${{ env.PAUSE_DOCS_DEPLOY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # VitePress `lastUpdated` reads commit history from git.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Generate changelog and roadmap
        run: make docs-content

      - name: Build site
        working-directory: docs
        run: bun run build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -s docs/.vitepress/dist/index.html
          file_count=$(find docs/.vitepress/dist -type f | wc -l | tr -d ' ')
          echo "✓ docs/.vitepress/dist looks healthy (${file_count} files)"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && env.PAUSE_DOCS_DEPLOY != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && needs.build.outputs.pause_deploy != 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: Docs
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
