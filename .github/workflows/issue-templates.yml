name: Issue templates

on:
  push:
    branches: [main]
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/validate_issue_templates.rb"
      - ".github/workflows/issue-templates.yml"
  pull_request:
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/validate_issue_templates.rb"
      - ".github/workflows/issue-templates.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate issue form YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint issue templates
        run: ruby .github/scripts/validate_issue_templates.rb
