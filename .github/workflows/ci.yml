name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Test
        run: go test -race ./...
      - name: Coverage
        run: env COVER_MIN=90 ./scripts/cover-lib.sh
